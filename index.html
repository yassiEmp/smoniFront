    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Combien coûte vraiment le permis chez Smoni, sans surprise ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tous nos tarifs sont publics sur la page Tarifs. Le forfait Permis B 20h démarre à 1 290 € (manuelle) ou 990 € (BVA 13h). Le contrat détaille chaque ligne. Vous ne paierez aucun supplément qui n'est pas mentionné à la signature — c'est dans nos 5 engagements."
          }
        },
        {
          "@type": "Question",
          "name": "J'ai déjà raté mon permis. Vous me prenez ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Sans frais de transfert, sans pack 13h imposé. On commence par une évaluation gratuite d'1h pour estimer ce dont vous avez besoin, et on construit un plan sur-mesure. C'est exactement le profil qu'on accueille le mieux."
          }
        },
        {
          "@type": "Question",
          "name": "J'ai 35 ans, je n'ai jamais conduit. C'est gênant ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. ~30% de nos candidats ont plus de 25 ans. Créneaux soir et samedi spécifiquement pour ça, moniteurs habitués aux adultes, zéro condescendance. Appelez quand vous voulez."
          }
        },
        {
          "@type": "Question",
          "name": "Vous acceptez le CPF ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, sous réserve de notre référencement EDOF (à confirmer à l'inscription). Depuis la réforme 2024, un reste à charge de 100 € s'applique. On vous accompagne dans le montage du dossier."
          }
        },
        {
          "@type": "Question",
          "name": "Et si vous fermez avec mon argent dedans ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Impossible. La loi (art. L.213-2 Code de la route) nous oblige à souscrire une garantie financière qui protège votre argent. Si on devait fermer, vous récupérez vos heures non consommées. Attestation envoyée sur demande."
          }
        },
        {
          "@type": "Question",
          "name": "Heures supplémentaires : c'est obligatoire avant l'examen ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. Si votre moniteur estime que vous êtes prêt·e après les 20h du forfait, vous passez. On ne facture pas \"9h obligatoires sur le centre d'examen\" comme certaines auto-écoles. Si des heures supp sont nécessaires, c'est justifié par écrit, sur votre niveau réel."
          }
        },
        {
          "@type": "Question",
          "name": "Boîte automatique, c'est vraiment pour les nuls ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. Statistique nationale 2024 : 75% de réussite en BVA vs 57% en manuelle. 13h légales vs 20h. Coût moyen 990 € vs 1 290 €. Si vous conduisez en ville ou en EV, c'est l'option rationnelle. Passerelle manuelle possible en 7h après."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de temps entre l'inscription et l'examen ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "À Vincennes (centres d'examen Rungis ou Créteil), 4 à 8 semaines selon la période, une fois prêt·e. Notre objectif est de vous présenter au plus tôt — pas au plus rentable pour nous."
          }
        },
        {
          "@type": "Question",
          "name": "Mon moniteur peut-il changer en cours de formation ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, sans frais. Vous nous le dites, on vous propose un autre moniteur de l'équipe. Pas besoin de justifier en détail."
          }
        },
        {
          "@type": "Question",
          "name": "Le simulateur de conduite, vous en avez ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pas pour l'instant. On préfère vous mettre directement dans une vraie voiture, en circulation réelle. Si on en introduit un jour, ce sera un complément optionnel, pas une obligation facturée."
          }
        },
        {
          "@type": "Question",
          "name": "Quels documents je dois préparer avant de venir ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pièce d'identité, justificatif de domicile < 6 mois, photo d'identité, et pour les 17-25 ans l'attestation JDC. Pas votre NEPH ? On vous accompagne pour le créer sur l'ANTS."
          }
        },
        {
          "@type": "Question",
          "name": "Vous proposez le permis accéléré sur une semaine ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, sur 5-7 jours, 20h de conduite, prix tout-compris 1 590 €. Pas de « supplément à la dernière minute ». Demandez-nous les dates disponibles."
          }
        },
        {
          "@type": "Question",
          "name": "Permis A2 / moto / 125 cm³ : c'est possible chez Smoni ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui pour le 125 cm³ (7h, 290 €) et selon la disponibilité du moniteur moto pour l'A2. Appelez-nous : on est honnête sur les délais."
          }
        },
        {
          "@type": "Question",
          "name": "Pourquoi vous n'avez pas (encore) d'avis Google ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Parce qu'on est une petite équipe créée en 2022, et qu'on n'a jamais acheté ni sollicité d'avis. Plutôt que des étoiles inventées, on vous propose de parler à un·e ancien·ne élève en direct, de venir nous voir, ou de démarrer par une 1ʳᵉ leçon sans engagement."
          }
        },
        {
          "@type": "Question",
          "name": "Comment vous différenciez-vous d'Ornikar, Stych ou En Voiture Simone ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "On est physique. Vous voyez Arike (la directrice) en vrai. Vous appelez et c'est elle ou un moniteur qui répond. Si votre formation pose problème, vous venez à l'agence — pas un chatbot qui met 4 jours à répondre."
          }
        }
      ]
    }
