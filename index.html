<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#2c2876" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Fonts self-hosted via @fontsource (see src/main.tsx). Google Fonts request removed. -->

  <!-- Per-route SEO tags (page title, page description, canonical, OpenGraph, Twitter Card) are emitted by PageHead via vite-react-ssg Head for every prerendered route. Only sitewide-stable tags are kept here, because react-helmet-async cannot dedupe against static tags already present in this template. SPA-fallback routes (non-prerendered) get their per-route tags on client hydration. -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
  <meta name="author" content="Smoni Auto-École Vincennes">
  <meta name="geo.region" content="FR-94">
  <meta name="geo.placename" content="Vincennes">
  <meta name="geo.position" content="48.84758;2.43632">
  <meta name="ICBM" content="48.84758, 2.43632">

  <!-- Open Graph (sitewide-stable only; og:title/description/url/image are per-route) -->
  <meta property="og:locale" content="fr_FR">
  <meta property="og:site_name" content="Smoni Auto-École Vincennes">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:alt" content="Smoni — Auto-école à Vincennes (94300)">

  <!-- Twitter Card (sitewide-stable only; twitter:title/description/image are per-route) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image:alt" content="Smoni — Auto-école à Vincennes (94300)">

  <!-- Sitewide WebSite schema (DrivingSchool/Organization, Services, FAQ, Breadcrumbs are emitted per-route via Helmet) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://smoni.fr/",
      "name": "Smoni Auto-École Vincennes",
      "inLanguage": "fr-FR"
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
<!-- impeccable-live-start -->
<!-- impeccable-live-end -->
</body>

</html>
